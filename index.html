<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Pong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    canvas {
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
<canvas id="pong"></canvas>
<script>
  const canvas = document.getElementById('pong');
  const ctx = canvas.getContext('2d');

  // Responsive sizing
  const BASE_W = 800;
  const BASE_H = 600;
  canvas.width = BASE_W;
  canvas.height = BASE_H;

  // ── Audio ────────────────────────────────────────────────────────────────
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playTone(frequency, duration, type = 'square', volume = 0.18) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + duration);
  }

  const sound = {
    paddle() { playTone(440, 0.05, 'square'); },
    wall()   { playTone(300, 0.05, 'square'); },
    score()  { playTone(180, 0.18, 'square'); playTone(120, 0.28, 'square', 0.12); },
  };

  // ── Constants ─────────────────────────────────────────────────────────────
  const W = BASE_W;
  const H = BASE_H;
  const PADDLE_W = 12;
  const PADDLE_H = 80;
  const BALL_SIZE = 10;
  const BALL_SPEED = 5.5;
  const PLAYER_SPEED = 6;
  const WIN_SCORE = 21;

  // AI difficulty: max speed the AI paddle can move per frame
  function aiMaxSpeed(playerScore) {
    if (playerScore <= 6)  return 2.8;   // easy
    if (playerScore <= 13) return 4.2;   // medium
    return 5.5;                          // hard
  }

  // ── State ─────────────────────────────────────────────────────────────────
  // 'start' | 'playing' | 'over'
  let state = 'start';

  let player, ai, ball, scores, keys, winner;

  function resetBall(serveTo = 'player') {
    const angle = (Math.random() * 60 - 30) * (Math.PI / 180);
    const dirX = serveTo === 'player' ? -1 : 1;
    ball = {
      x: W / 2,
      y: H / 2,
      vx: dirX * BALL_SPEED * Math.cos(angle),
      vy: BALL_SPEED * Math.sin(angle),
      w: BALL_SIZE,
      h: BALL_SIZE,
    };
  }

  function initGame() {
    player = { x: 20, y: H / 2 - PADDLE_H / 2, w: PADDLE_W, h: PADDLE_H, dy: 0 };
    ai     = { x: W - 20 - PADDLE_W, y: H / 2 - PADDLE_H / 2, w: PADDLE_W, h: PADDLE_H };
    scores = { player: 0, ai: 0 };
    keys   = {};
    winner = null;
    resetBall('player');
    state = 'playing';
  }

  // ── Input ─────────────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (state === 'start' || state === 'over') {
      // Resume audio context on first interaction (browser policy)
      if (audioCtx.state === 'suspended') audioCtx.resume();
      if (state === 'start') initGame();
      else if (state === 'over') initGame();
    }
    if (['ArrowUp', 'ArrowDown'].includes(e.key)) e.preventDefault();
  });
  document.addEventListener('keyup', e => { keys[e.key] = false; });

  // ── Collision ─────────────────────────────────────────────────────────────
  function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function clamp(val, min, max) {
    return Math.max(min, Math.min(max, val));
  }

  // ── Update ─────────────────────────────────────────────────────────────────
  function update() {
    // Player movement
    if (keys['ArrowUp'])   player.y -= PLAYER_SPEED;
    if (keys['ArrowDown']) player.y += PLAYER_SPEED;
    player.y = clamp(player.y, 0, H - PADDLE_H);

    // AI movement
    const speed = aiMaxSpeed(scores.player);
    const aiCenter = ai.y + PADDLE_H / 2;
    const ballCenter = ball.y + BALL_SIZE / 2;
    if (aiCenter < ballCenter - 4)      ai.y += Math.min(speed, ballCenter - aiCenter);
    else if (aiCenter > ballCenter + 4) ai.y -= Math.min(speed, aiCenter - ballCenter);
    ai.y = clamp(ai.y, 0, H - PADDLE_H);

    // Ball movement
    ball.x += ball.vx;
    ball.y += ball.vy;

    // Top/bottom wall bounce
    if (ball.y <= 0) {
      ball.y = 0;
      ball.vy = Math.abs(ball.vy);
      sound.wall();
    } else if (ball.y + ball.h >= H) {
      ball.y = H - ball.h;
      ball.vy = -Math.abs(ball.vy);
      sound.wall();
    }

    // Paddle collisions
    if (ball.vx < 0 && rectsOverlap(ball, player)) {
      // Bounce off player paddle; add angle based on hit position
      const hitPos = (ball.y + ball.h / 2 - (player.y + PADDLE_H / 2)) / (PADDLE_H / 2);
      const bounceAngle = hitPos * 60 * (Math.PI / 180);
      ball.vx =  Math.abs(BALL_SPEED * Math.cos(bounceAngle));
      ball.vy =  BALL_SPEED * Math.sin(bounceAngle);
      ball.x = player.x + player.w; // prevent sticking
      sound.paddle();
    } else if (ball.vx > 0 && rectsOverlap(ball, ai)) {
      const hitPos = (ball.y + ball.h / 2 - (ai.y + PADDLE_H / 2)) / (PADDLE_H / 2);
      const bounceAngle = hitPos * 60 * (Math.PI / 180);
      ball.vx = -Math.abs(BALL_SPEED * Math.cos(bounceAngle));
      ball.vy =  BALL_SPEED * Math.sin(bounceAngle);
      ball.x = ai.x - ball.w; // prevent sticking
      sound.paddle();
    }

    // Scoring
    if (ball.x + ball.w < 0) {
      scores.ai++;
      sound.score();
      if (scores.ai >= WIN_SCORE) { winner = 'ai'; state = 'over'; return; }
      resetBall('player');
    } else if (ball.x > W) {
      scores.player++;
      sound.score();
      if (scores.player >= WIN_SCORE) { winner = 'player'; state = 'over'; return; }
      resetBall('ai');
    }
  }

  // ── Draw ───────────────────────────────────────────────────────────────────
  function drawRect(x, y, w, h, color = '#fff') {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w, h);
  }

  function drawText(text, x, y, size = 24, color = '#fff', align = 'center') {
    ctx.fillStyle = color;
    ctx.font = `bold ${size}px 'Courier New', monospace`;
    ctx.textAlign = align;
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x, y);
  }

  function drawDashedCenter() {
    ctx.setLineDash([10, 14]);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(W / 2, 0);
    ctx.lineTo(W / 2, H);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function drawStartScreen() {
    ctx.clearRect(0, 0, W, H);
    drawText('PONG', W / 2, H / 2 - 80, 72);
    drawText('You vs Computer', W / 2, H / 2 - 10, 22, '#aaa');
    drawText('First to 21 wins', W / 2, H / 2 + 30, 18, '#888');
    drawText('↑ ↓  Arrow Keys to move', W / 2, H / 2 + 75, 16, '#666');
    drawText('Press any key to start', W / 2, H / 2 + 120, 20, '#fff');
    // Pulse opacity for start prompt
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 500);
    ctx.globalAlpha = pulse;
    drawText('▶', W / 2, H / 2 + 155, 18, '#666');
    ctx.globalAlpha = 1;
  }

  function drawGame() {
    ctx.clearRect(0, 0, W, H);
    drawDashedCenter();

    // Scores
    drawText(scores.player, W / 2 - 80, 48, 48);
    drawText(scores.ai,     W / 2 + 80, 48, 48);
    drawText('YOU', W / 2 - 80, 96, 14, '#555');
    drawText('CPU', W / 2 + 80, 96, 14, '#555');

    // Difficulty indicator
    const diff = scores.player <= 6 ? 'EASY' : scores.player <= 13 ? 'MED' : 'HARD';
    const diffColor = scores.player <= 6 ? '#4a4' : scores.player <= 13 ? '#aa4' : '#a44';
    drawText(diff, W / 2, 115, 11, diffColor);

    // Paddles
    drawRect(player.x, player.y, player.w, player.h);
    drawRect(ai.x,     ai.y,     ai.w,     ai.h);

    // Ball
    drawRect(ball.x, ball.y, ball.w, ball.h);
  }

  function drawOverScreen() {
    ctx.clearRect(0, 0, W, H);

    const won = winner === 'player';
    const headline = won ? 'YOU WIN!' : 'GAME OVER';
    const sub      = won ? 'Congratulations!' : 'Better luck next time.';
    const color    = won ? '#4f4' : '#f44';

    drawText(headline, W / 2, H / 2 - 70, 58, color);
    drawText(sub, W / 2, H / 2 - 10, 22, '#aaa');
    drawText(`${scores.player} — ${scores.ai}`, W / 2, H / 2 + 45, 36);
    drawText('Press any key to play again', W / 2, H / 2 + 110, 18, '#888');
  }

  // ── Game loop ──────────────────────────────────────────────────────────────
  function loop() {
    switch (state) {
      case 'start':
        drawStartScreen();
        break;
      case 'playing':
        update();
        drawGame();
        break;
      case 'over':
        drawOverScreen();
        break;
    }
    requestAnimationFrame(loop);
  }

  loop();
</script>
</body>
</html>
